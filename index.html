<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANONYCHAT TERMINAL</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Courier New, monospace;
    overflow-x:hidden;
}

#matrix{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.container{
    width:95%;
    max-width:1300px;
    margin:auto;
    padding-top:20px;
}

.panel{
    background:rgba(0,0,0,0.9);
    border:1px solid #00ff66;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 0 15px #00ff66;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    border-radius:8px;
    font-family:Courier New, monospace;
    direction:ltr;
}

button{
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

nav a{
    margin-right:20px;
    cursor:pointer;
}

.layout{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.users-panel{
    width:300px;
}

.chat-panel{
    flex:1;
}

.chat-box{
    height:500px;
    overflow-y:auto;
    border:1px solid #00ff66;
    padding:10px;
    border-radius:10px;
    background:black;
}

.message{
    background:#101010;
    border-left:4px solid #00ff66;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
    direction:ltr;
    unicode-bidi:plaintext;
    word-wrap:break-word;
}

.chat-input{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.chat-input input{
    flex:1;
    margin-top:0;
}

.user-btn{
    margin-bottom:10px;
}

.chat-image{
    max-width:220px;
    border-radius:10px;
    margin-top:10px;
}

.profile-pic{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #00ff66;
}

#typing-status{
    margin-top:10px;
    color:#999;
}

@media(max-width:900px){

    .layout{
        flex-direction:column;
    }

    .users-panel{
        width:100%;
    }

}

</style>
</head>
<body dir="ltr">

<canvas id="matrix"></canvas>

<div class="container">

<div id="auth-section" class="panel">

<h1>ANONYCHAT TERMINAL</h1>

<input type="email" id="email" placeholder="EMAIL">

<input type="password" id="password" placeholder="PASSWORD">

<button onclick="signUp()">SIGN UP</button>

<button onclick="login()">LOGIN</button>

</div>

<div id="main-content" style="display:none;">

<nav class="panel">

<a onclick="showPage('chat')">CHAT</a>
<a onclick="showPage('profile')">PROFILE</a>
<a onclick="logout()">LOGOUT</a>

</nav>

<div id="page-chat">

<div class="layout">

<div class="users-panel panel">

<h3>CHANNELS</h3>

<button onclick="openGlobalChat()">
GLOBAL CHAT
</button>

<hr style="border-color:#00ff66;">

<h3>PRIVATE USERS</h3>

<div id="users-list"></div>

</div>

<div class="chat-panel panel">

<h2 id="chat-title">GLOBAL CHAT</h2>

<div id="chat-box" class="chat-box"></div>

<div id="typing-status"></div>

<div class="chat-input">

<input type="text" id="chat-input" placeholder="TYPE MESSAGE...">

<button onclick="sendMsg()">SEND</button>

</div>

<input type="file" id="image-input" accept="image/*">

<button onclick="sendImage()">
SEND IMAGE
</button>

</div>

</div>

</div>

<div id="page-profile" style="display:none;" class="panel">

<h2>PROFILE SETTINGS</h2>

<p id="user-email-display"></p>

<img id="profile-preview" class="profile-pic">

<input type="text" id="username-input" placeholder="USERNAME">

<label>CHAT COLOR</label>

<input type="color" id="color-input" value="#00ff66">

<input type="file" id="profile-pic-input" accept="image/*">

<button onclick="updateProfile()">
SAVE PROFILE
</button>

</div>

</div>

</div>

<audio id="msg-sound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<script>

const firebaseConfig = {

    apiKey: "AIzaSyAy19nnMz2BH-vJ0w27sfMYD6IhlWUothQ",

    authDomain: "my-chat-944a0.firebaseapp.com",

    projectId: "my-chat-944a0",

    storageBucket: "my-chat-944a0.appspot.com",

    messagingSenderId: "176386861788",

    appId: "1:176386861788:web:b2cf1263b4774138c4a219",

    databaseURL: "https://my-chat-944a0-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUsername = '';
let currentColor = '#00ff66';
let currentPhoto = '';
let currentChatType = 'global';
let selectedUser = null;
let currentChatId = null;

function signUp(){

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.createUserWithEmailAndPassword(email,password)
    .catch(err=>alert(err.message));

}

function login(){

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email,password)
    .catch(err=>alert(err.message));

}

function logout(){

    auth.signOut();
    location.reload();

}

function showPage(page){

    document.getElementById('page-chat').style.display =
    page === 'chat' ? 'block':'none';

    document.getElementById('page-profile').style.display =
    page === 'profile' ? 'block':'none';

}

function setOnlineStatus(){

    const statusRef = db.ref(
        'status/' + auth.currentUser.uid
    );

    statusRef.set({

        online:true,

        lastSeen:Date.now()

    });

    statusRef.onDisconnect().set({

        online:false,

        lastSeen:Date.now()

    });

}


auth.onAuthStateChanged(user=>{

    if(user){

        document.getElementById('auth-section').style.display='none';

        document.getElementById('main-content').style.display='block';

        document.getElementById('user-email-display').innerText =
        'LOGGED IN: ' + user.email;

        db.ref('users/' + user.uid).set({
            email:user.email
        });

        loadProfile(user.uid);

        loadUsers();

        openGlobalChat();

        setOnlineStatus();

    }

});

async function updateProfile(){

    try{

        const username = document.getElementById('username-input').value.trim();

        const color = document.getElementById('color-input').value;

        const file = document.getElementById('profile-pic-input').files[0];

        let photo = currentPhoto || '';

        if(file){

            const ref = storage.ref(
                'profilePics/' + auth.currentUser.uid
            );

            await ref.put(file);

            photo = await ref.getDownloadURL();

        }

        await db.ref(
            'profiles/' + auth.currentUser.uid
        ).set({

            username: username || auth.currentUser.email.split('@')[0],

            color:color,

            photo:photo

        });

        currentUsername = username || auth.currentUser.email.split('@')[0];

        currentColor = color;

        currentPhoto = photo;

        document.getElementById('profile-preview').src = photo;

        alert('PROFILE UPDATED');

        loadUsers();

    }catch(err){

        alert(err.message);

    }

}

function loadProfile(uid){

    db.ref('profiles/' + uid)
    .once('value')
    .then(snap=>{

        if(snap.exists()){

            const data = snap.val();

            currentUsername = data.username || auth.currentUser.email.split('@')[0];

            currentColor = data.color || '#00ff66';

            currentPhoto = data.photo || '';

            document.getElementById('username-input').value = currentUsername;

            document.getElementById('color-input').value = currentColor;

            if(currentPhoto){
                document.getElementById('profile-preview').src = currentPhoto;
            }

        }else{

            currentUsername = auth.currentUser.email.split('@')[0];

        }

    });

}

function loadUsers(){

    db.ref('users')
    .on('value',snap=>{

        const usersDiv = document.getElementById('users-list');

        usersDiv.innerHTML='';

        snap.forEach(child=>{

            const user = child.val();
            const uid = child.key;

            if(uid !== auth.currentUser.uid){

                const btn = document.createElement('button');

                btn.className='user-btn';

                const statusDot = document.createElement('span');

                statusDot.style.display='inline-block';
                statusDot.style.width='10px';
                statusDot.style.height='10px';
                statusDot.style.borderRadius='50%';
                statusDot.style.marginRight='10px';

                const text = document.createElement('span');

                db.ref('profiles/' + uid)
                .on('value', profileSnap => {

                    if(profileSnap.val() && profileSnap.val().username){

                        text.textContent = profileSnap.val().username;

                    }else{

                        text.textContent = user.email.split('@')[0];

                    }

                });

                btn.appendChild(statusDot);
                btn.appendChild(text);

                btn.onclick = ()=> openPrivateChat(uid,text.textContent);

                db.ref('status/' + uid)
                .on('value',s=>{

                    if(s.val() && s.val().online){
                        statusDot.style.background='#00ff66';
                    }else{
                        statusDot.style.background='red';
                    }

                });

                usersDiv.appendChild(btn);

            }

        });

    });

}

function generateChatId(uid1,uid2){

    return [uid1,uid2].sort().join('_');

}

function openGlobalChat(){

    currentChatType='global';

    document.getElementById('chat-title').innerText='GLOBAL CHAT';

    document.getElementById('chat-box').innerHTML='';

    db.ref('globalMessages').off();

    db.ref('globalMessages')
    .limitToLast(100)
    .on('child_added',snap=>{

        renderMessage(snap.val());

    });

}

function openPrivateChat(uid,username){

    currentChatType='private';

    selectedUser = uid;

    currentChatId = generateChatId(auth.currentUser.uid,uid);

    document.getElementById('chat-title').innerText =
    'PRIVATE CHAT: ' + username;

    document.getElementById('chat-box').innerHTML='';

    db.ref('privateChats/' + currentChatId).off();

    db.ref('privateChats/' + currentChatId)
    .limitToLast(100)
    .on('child_added',snap=>{

        renderMessage(snap.val());

    });

    db.ref('typing/' + currentChatId)
    .on('value',snap=>{

        const status = document.getElementById('typing-status');

        if(snap.val() && snap.val().user !== currentUsername){

            status.textContent = snap.val().user + ' is typing...';

        }else{

            status.textContent='';

        }

    });

}

function renderMessage(m){

    const div = document.createElement('div');

    div.className='message';

    div.style.borderLeftColor = m.color || '#00ff66';

    const time = new Date(m.timestamp).toLocaleTimeString();

    div.innerHTML =

    "<strong style='color:" +
    (m.color || '#00ff66') +
    "'>" +
    m.name +
    "</strong> <small>" +
    time +
    "</small><br>" +
    (m.text || '');

    if(m.image){

        div.innerHTML +=
        "<br><img class='chat-image' src='" +
        m.image +
        "'>";

    }

    if(m.sender === auth.currentUser.uid){

        const del = document.createElement('button');

        del.textContent='DELETE';

        del.onclick = ()=>{

            if(currentChatType === 'global'){

                db.ref('globalMessages/' + m.messageId).remove();

            }else{

                db.ref('privateChats/' + currentChatId + '/' + m.messageId).remove();

            }

        };

        div.appendChild(del);

    }

    document.getElementById('chat-box').appendChild(div);

    document.getElementById('msg-sound').play();

    const box = document.getElementById('chat-box');

    box.scrollTop = box.scrollHeight;

}

function sendMsg(){

    const input = document.getElementById('chat-input');

    const text = input.value;

    if(text.trim()==='') return;

    const ref = currentChatType === 'global'
    ? db.ref('globalMessages').push()
    : db.ref('privateChats/' + currentChatId).push();

    const msg = {

        messageId:ref.key,

        sender:auth.currentUser.uid,

        name:currentUsername,

        text:text,

        color:currentColor,

        photo:currentPhoto,

        timestamp:Date.now()

    };

    ref.set(msg);

    input.value='';

}

async function sendImage(){

    const file = document.getElementById('image-input').files[0];

    if(!file){

        alert('Choose image');

        return;

    }

    try{

        const storageRef = storage.ref(
            'chatImages/' + Date.now() + '_' + file.name
        );

        await storageRef.put(file);

        const url = await storageRef.getDownloadURL();

        const ref = currentChatType === 'global'
        ? db.ref('globalMessages').push()
        : db.ref('privateChats/' + currentChatId).push();

        ref.set({

            messageId:ref.key,

            sender:auth.currentUser.uid,

            name:currentUsername,

            image:url,

            color:currentColor,

            timestamp:Date.now()

        });

        alert('Image sent');

    }catch(err){

        alert(err.message);

    }

}


document.getElementById('chat-input')
.addEventListener('input',()=>{

    if(currentChatType === 'private'){

        db.ref('typing/' + currentChatId)
        .set({

            user:currentUsername,

            typing:true

        });

        setTimeout(()=>{

            db.ref('typing/' + currentChatId).remove();

        },1500);

    }

});

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars='01';
const fontSize=14;
const columns = canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){
    drops[i]=1;
}

function draw(){

    ctx.fillStyle='rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle='#00ff66';
    ctx.font=fontSize+'px monospace';

    for(let i=0;i<drops.length;i++){

        const text = chars[Math.floor(Math.random()*chars.length)];

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i]=0;
        }

        drops[i]++;

    }

}

setInterval(draw,33);

</script>

</body>
    </html>

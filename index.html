<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER_OS_V2</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <!-- AUTH SECTION -->
    <div id="auth-section">
        <h1 style="font-size: 1.5rem;">CHARON_HUB</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="signUp()">SIGNUP</button>
        <button onclick="login()" style="margin-top:10px;">LOGIN</button>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="main-content" style="display:none;">
        <nav>
            <button onclick="showPage('chat')" style="width:auto; padding: 5px;">TERMINAL</button>
            <button onclick="showPage('friends')" style="width:auto; padding: 5px;">NODES</button>
            <button onclick="showPage('learning')" style="width:auto; padding: 5px;">ARCHIVE</button>
            <button onclick="logout()" style="width:auto; padding: 5px; color: red; border-color: red;">EXIT</button>
        </nav>

        <!-- General Chat -->
        <div id="page-chat">
            <h3>[GENERAL_COMM_LINK]</h3>
            <div id="chat-box" class="display-area"></div>
            <div style="display:flex;">
                <input id="chat-input" placeholder="Enter transmission...">
                <button onclick="sendMsg()" style="width:80px;">SEND</button>
            </div>
        </div>

        <!-- Friends / Private Chat Section -->
        <div id="page-friends" style="display:none;">
            <h3>[ACTIVE_NODES]</h3>
            <div id="friends-list" class="display-area">
                <p>Scanning for active users...</p>
            </div>
        </div>

        <!-- Learning Archive -->
        <div id="page-learning" style="display:none;">
            <h3>[DATA_ARCHIVES]</h3>
            <div id="learning-list" class="display-area">
                <p>Accessing secure database...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAy19nnMz2BH-vJ0w27sfMYD6IhlWUothQ",
        authDomain: "my-chat-944a0.firebaseapp.com",
        projectId: "my-chat-944a0",
        storageBucket: "my-chat-944a0.firebasestorage.app",
        messagingSenderId: "178308861788",
        appId: "1:178308861788:web:b2cf1263b4774138c4a219",
        databaseURL: "https://my-chat-944a0-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function showPage(page) {
        const pages = ['page-chat', 'page-friends', 'page-learning'];
        pages.forEach(p => document.getElementById(p).style.display = 'none');
        document.getElementById('page-' + page).style.display = 'block';
        
        if(page === 'learning') loadResources();
        if(page === 'friends') loadUsers();
    }

    // --- AUTH ---
    function signUp() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.createUserWithEmailAndPassword(e, p).then(cred => {
            // Store user in database so others can see them in "Friends"
            db.ref('users/' + cred.user.uid).set({ email: e, status: "online" });
        }).catch(err => alert(err.message));
    }

    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }

    function logout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadMessages();
        }
    });

    // --- CHAT ---
    function sendMsg() {
        const txt = document.getElementById('chat-input').value;
        if(txt) {
            db.ref('messages').push({
                user: auth.currentUser.email.split('@')[0],
                text: txt,
                time: Date.now()
            });
            document.getElementById('chat-input').value = "";
        }
    }

    function loadMessages() {
        db.ref('messages').limitToLast(15).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                box.innerHTML += `<p><span style="color:#888;">[${new Date(m.time).toLocaleTimeString()}]</span> <strong>${m.user}:</strong> ${m.text}</p>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // --- FRIENDS LIST ---
    function loadUsers() {
        const list = document.getElementById('friends-list');
        db.ref('users').on('value', snap => {
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(u.email !== auth.currentUser.email) {
                    list.innerHTML += `
                        <div class="user-node">
                            <span>● ${u.email}</span>
                            <button onclick="startPrivateChat('${child.key}')" style="width:auto; font-size:10px;">MESSAGE</button>
                        </div>`;
                }
            });
        });
    }

    // --- ARCHIVES ---
    function loadResources() {
        const list = document.getElementById('learning-list');
        db.ref('learningResources').on('value', snap => {
            list.innerHTML = "";
            snap.forEach(child => {
                const item = child.val();
                list.innerHTML += `
                    <div class="resource-card">
                        <strong>> ${item.title}</strong><br>
                        <a href="${item.link}" target="_blank">DECRYPT_DATA</a>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANONYCHAT</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>

body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Courier New, monospace;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding-top:20px;
}

.panel{
    border:1px solid #00ff66;
    padding:15px;
    margin-bottom:15px;
    background:#050505;
    box-shadow:0 0 10px #00ff66;
}

h1,h2,h3{
    color:#00ff66;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    box-sizing:border-box;
    font-family:Courier New;
}

button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px;
    cursor:pointer;
    margin-top:10px;
    font-family:Courier New;
}

button:hover{
    background:#00ff66;
    color:black;
}

nav{
    margin-bottom:15px;
}

nav a{
    margin-right:15px;
    cursor:pointer;
    color:#00ff66;
}

.layout{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.users-panel{
    width:250px;
}

.chat-panel{
    flex:1;
}

.chat-box{
    height:400px;
    overflow-y:auto;
    border:1px solid #00ff66;
    padding:10px;
    background:black;
    margin-bottom:10px;
}

.message{
    margin-bottom:10px;
    padding:8px;
    border-left:3px solid #00ff66;
    background:#0d0d0d;
    word-wrap:break-word;
}

.system{
    color:#888;
}

.chat-input{
    display:flex;
    gap:10px;
}

.chat-input input{
    flex:1;
    margin-top:0;
}

.user-btn{
    width:100%;
    text-align:left;
    margin-bottom:10px;
}

.private-active{
    background:#00ff66;
    color:black;
}

@media(max-width:800px){

    .layout{
        flex-direction:column;
    }

    .users-panel{
        width:100%;
    }

}

</style>

</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="auth-section" class="panel">

        <h1>ANONYCHAT TERMINAL</h1>

        <input type="email" id="email" placeholder="EMAIL">

        <input type="password" id="password" placeholder="PASSWORD">

        <button onclick="signUp()">REGISTER</button>

        <button onclick="login()">LOGIN</button>

    </div>

    <!-- MAIN -->
    <div id="main-content" style="display:none;">

        <nav class="panel">

            <a onclick="showPage('chat')">CHAT</a>

            <a onclick="showPage('profile')">PROFILE</a>

            <a onclick="logout()">LOGOUT</a>

        </nav>

        <!-- CHAT PAGE -->
        <div id="page-chat">

            <div class="layout">

                <!-- USERS -->
                <div class="users-panel panel">

                    <h3>PRIVATE USERS</h3>

                    <button onclick="openGlobalChat()">
                        GLOBAL CHAT
                    </button>

                    <hr style="border-color:#00ff66;">

                    <div id="users-list"></div>

                </div>

                <!-- CHAT -->
                <div class="chat-panel panel">

                    <h3 id="chat-title">
                        GLOBAL CHAT
                    </h3>

                    <div id="chat-box" class="chat-box"></div>

                    <div class="chat-input">

                        <input
                            type="text"
                            id="chat-input"
                            placeholder="ENTER MESSAGE..."
                        >

                        <button onclick="sendMsg()">
                            SEND
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- PROFILE -->
        <div id="page-profile" style="display:none;" class="panel">

            <h2>PROFILE SETTINGS</h2>

            <p id="user-email-display"></p>

            <input
                type="text"
                id="username-input"
                placeholder="USERNAME"
            >

            <label>CHAT COLOR</label>

            <input
                type="color"
                id="color-input"
                value="#00ff66"
            >

            <button onclick="updateProfile()">
                SAVE PROFILE
            </button>

        </div>

    </div>

</div>

<script>

const firebaseConfig = {

    apiKey: "AIzaSyAy19nnMz2BH-vJ0w27sfMYD6IhlWUothQ",

    authDomain: "my-chat-944a0.firebaseapp.com",

    projectId: "my-chat-944a0",

    storageBucket: "my-chat-944a0.appspot.com",

    messagingSenderId: "176386861788",

    appId: "1:176386861788:web:b2cf1263b4774138c4a219",

    databaseURL: "https://my-chat-944a0-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.database();

let currentUsername = "Guest";

let currentColor = "#00ff66";

let currentChatType = "global";

let selectedUser = null;

let currentChatId = null;


// AUTH
function signUp(){

    const email =
        document.getElementById('email').value;

    const password =
        document.getElementById('password').value;

    auth.createUserWithEmailAndPassword(
        email,
        password
    )
    .catch(err => alert(err.message));

}

function login(){

    const email =
        document.getElementById('email').value;

    const password =
        document.getElementById('password').value;

    auth.signInWithEmailAndPassword(
        email,
        password
    )
    .catch(err => alert(err.message));

}

function logout(){

    auth.signOut();

    location.reload();

}


// AUTH STATE
auth.onAuthStateChanged(user => {

    if(user){

        document.getElementById(
            'auth-section'
        ).style.display = 'none';

        document.getElementById(
            'main-content'
        ).style.display = 'block';

        document.getElementById(
            'user-email-display'
        ).innerText =
            "LOGGED IN: " + user.email;

        db.ref('users/' + user.uid).set({

            email:user.email

        });

        loadProfile(user.uid);

        loadUsers();

        openGlobalChat();

    }

});


// PROFILE
function updateProfile(){

    const username =
        document.getElementById(
            'username-input'
        ).value;

    const color =
        document.getElementById(
            'color-input'
        ).value;

    db.ref(
        'profiles/' + auth.currentUser.uid
    ).set({

        username:username,

        color:color

    });

    currentUsername = username;

    currentColor = color;

    alert("PROFILE UPDATED");

}

function loadProfile(uid){

    db.ref('profiles/' + uid)
    .on('value', snap => {

        if(snap.val()){

            currentUsername =
                snap.val().username ||
                auth.currentUser.email;

            currentColor =
                snap.val().color ||
                "#00ff66";

            document.getElementById(
                'username-input'
            ).value =
                currentUsername;

            document.getElementById(
                'color-input'
            ).value =
                currentColor;

        }

    });

}


// USERS
function loadUsers(){

    db.ref('users')
    .on('value', snap => {

        const usersDiv =
            document.getElementById(
                'users-list'
            );

        usersDiv.innerHTML = "";

        snap.forEach(child => {

            const user = child.val();

            const uid = child.key;

            if(uid !== auth.currentUser.uid){

                const btn =
                    document.createElement(
                        'button'
                    );

                btn.className = "user-btn";

                btn.textContent =
                    user.email;

                btn.onclick = () =>
                    openPrivateChat(
                        uid,
                        user.email
                    );

                usersDiv.appendChild(btn);

            }

        });

    });

}


// CHAT IDS
function generateChatId(uid1, uid2){

    return [uid1, uid2]
    .sort()
    .join("_");

}


// GLOBAL CHAT
function openGlobalChat(){

    currentChatType = "global";

    selectedUser = null;

    document.getElementById(
        'chat-title'
    ).innerText =
        "GLOBAL CHAT";

    document.getElementById(
        'chat-box'
    ).innerHTML = "";

    db.ref('globalMessages')
    .off();

    db.ref('globalMessages')
    .limitToLast(100)
    .on('child_added', snap => {

        renderMessage(snap.val());

    });

}


// PRIVATE CHAT
function openPrivateChat(uid, email){

    currentChatType = "private";

    selectedUser = uid;

    currentChatId =
        generateChatId(
            auth.currentUser.uid,
            uid
        );

    document.getElementById(
        'chat-title'
    ).innerText =
        "PRIVATE CHAT: " + email;

    document.getElementById(
        'chat-box'
    ).innerHTML = "";

    db.ref(
        'privateChats/' + currentChatId
    ).off();

    db.ref(
        'privateChats/' + currentChatId
    )
    .limitToLast(100)
    .on('child_added', snap => {

        renderMessage(snap.val());

    });

}


// RENDER MESSAGE
function renderMessage(m){

    const div =
        document.createElement('div');

    div.className = "message";

    div.style.borderLeftColor =
        m.color || "#00ff66";

    div.innerHTML =
        "<strong style='color:" +
        (m.color || "#00ff66") +
        "'>" +
        m.name +
        ":</strong><br>" +
        m.text;

    document.getElementById(
        'chat-box'
    ).appendChild(div);

    const box =
        document.getElementById(
            'chat-box'
        );

    box.scrollTop = box.scrollHeight;

}


// SEND MESSAGE
function sendMsg(){

    const input =
        document.getElementById(
            'chat-input'
        );

    const text = input.value;

    if(text.trim() === "") return;

    const msg = {

        sender:auth.currentUser.uid,

        name:currentUsername,

        text:text,

        color:currentColor,

        timestamp:Date.now()

    };

    if(currentChatType === "global"){

        db.ref('globalMessages').push(msg);

    }else{

        db.ref(
            'privateChats/' + currentChatId
        ).push(msg);

    }

    input.value = "";

}


// NAVIGATION
function showPage(page){

    document.getElementById(
        'page-chat'
    ).style.display =
        page === 'chat'
        ? 'block'
        : 'none';

    document.getElementById(
        'page-profile'
    ).style.display =
        page === 'profile'
        ? 'block'
        : 'none';

}

</script>

</body>
</html>

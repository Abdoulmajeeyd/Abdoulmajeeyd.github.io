<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER_OS_CHAT</title>
    <!-- Firebase Legacy Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <!-- 1. AUTH SECTION -->
    <div id="auth-section">
        <h1>SYSTEM_ACCESS</h1>
        <input type="email" id="email" placeholder="USER_IDENTIFIER (Email)">
        <input type="password" id="password" placeholder="ACCESS_KEY (Password)">
        <button onclick="signUp()">INITIALIZE_NEW_USER</button>
        <button onclick="login()" style="margin-top:10px; border-color: #555;">EXISTING_UPLINK</button>
    </div>

    <!-- 2. MAIN INTERFACE -->
    <div id="main-content" style="display:none;">
        <nav>
            <a onclick="showPage('chat')">TERMINAL</a> | 
            <a onclick="showPage('learning')">ARCHIVES</a> | 
            <a onclick="showPage('profile')">PROFILE</a> | 
            <a onclick="logout()">LOGOUT</a>
        </nav>

        <!-- Chat Page -->
        <div id="page-chat">
            <h2>COMM_LINK_ESTABLISHED</h2>
            <div id="chat-box"></div>
            <input id="chat-input" placeholder="Type command...">
            <button onclick="sendMsg()">TRANSMIT</button>
        </div>

        <!-- Learning Page -->
        <div id="page-learning" style="display:none;">
            <h2>KNOWLEDGE_DATABASE</h2>
            <div id="learning-list">
                <p>Connecting to secure archives...</p>
            </div>
        </div>

        <!-- Profile Page -->
        <div id="page-profile" style="display:none;">
            <h2>USER_METADATA</h2>
            <p id="user-email-display"></p>
            <input type="text" id="username-input" placeholder="Update Username">
            <button onclick="updateUsername()">COMMIT_CHANGES</button>
        </div>
    </div>
</div>

<script>
    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
        apiKey: "AIzaSyAy19hmMzZBH-VJ8W27sfWYD83hIMXothQ",
        authDomain: "my-chat-944a0.firebaseapp.com",
        projectId: "my-chat-944a0",
        storageBucket: "my-chat-944a0.firebasestorage.app",
        messagingSenderId: "178308861788",
        appId: "1:178308861788:web:b2cf1263b4774138c4a219",
        databaseURL: "https://my-chat-944a0-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- NAVIGATION LOGIC ---
    function showPage(page) {
        document.getElementById('page-chat').style.display = page === 'chat' ? 'block' : 'none';
        document.getElementById('page-learning').style.display = page === 'learning' ? 'block' : 'none';
        document.getElementById('page-profile').style.display = page === 'profile' ? 'block' : 'none';
        if(page === 'learning') loadResources();
    }

    // --- AUTH LOGIC ---
    function signUp() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }

    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }

    function logout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('user-email-display').innerText = "IDENTIFIED AS: " + user.email;
            loadMessages();
        }
    });

    // --- CHAT LOGIC ---
    function sendMsg() {
        const txt = document.getElementById('chat-input').value;
        if(txt) {
            db.ref('messages').push({
                user: auth.currentUser.email,
                text: txt,
                time: Date.now()
            });
            document.getElementById('chat-input').value = "";
        }
    }

    function loadMessages() {
        db.ref('messages').limitToLast(20).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                box.innerHTML += `<p><strong>${m.user.split('@')[0]}:</strong> ${m.text}</p>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // --- LEARNING LOGIC ---
    function loadResources() {
        const list = document.getElementById('learning-list');
        db.ref('learningResources').on('value', snap => {
            list.innerHTML = "";
            if(!snap.exists()) {
                list.innerHTML = "<p>NO DATA FOUND IN ARCHIVES.</p>";
                return;
            }
            snap.forEach(child => {
                const item = child.val();
                list.innerHTML += `
                    <div style="border: 1px solid #00ff41; margin-bottom: 10px; padding: 10px; background: rgba(0,255,65,0.1);">
                        <strong>> ${item.title}</strong><br>
                        <small>${item.info}</small><br>
                        <a href="${item.link}" target="_blank" style="color: #000; background: #00ff41; padding: 2px 5px; text-decoration: none; display: inline-block; margin-top: 5px;">ACCESS_DATA</a>
                    </div>
                `;
            });
        });
    }
</script>
</body>
</html>

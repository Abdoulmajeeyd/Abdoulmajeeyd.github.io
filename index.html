<!DOCTYPE html>
<html>
<head>
    <title>Live News & Chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        #chat-box { height: 300px; border: 2px solid #333; overflow-y: scroll; padding: 10px; background: white; margin: 10px auto; max-width: 500px; text-align: left; }
        input { width: 60%; padding: 10px; }
        button { padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Global News & Chat</h1>
    
    <div id="chat-box">
        <p><i>Loading messages...</i></p>
    </div>

    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>

    <script>
      // Your specific Firebase keys
      const firebaseConfig = {
        apiKey: "AIzaSyAy19nnMz2BH-vJ0w27sfMYD6IhlWUothQ",
        authDomain: "my-chat-944a0.firebaseapp.com",
        projectId: "my-chat-944a0",
        storageBucket: "my-chat-944a0.firebasestorage.app",
        messagingSenderId: "176386861788",
        appId: "1:176386861788:web:b2cf1263b4774138c4a219",
        databaseURL: "https://my-chat-944a0-default-rtdb.firebaseio.com"
      };

      // Initialize
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // Send Message
      function send() {
          const text = document.getElementById('msg').value;
          if(text.trim() !== "") {
              db.ref("messages").push({ text: text });
              document.getElementById('msg').value = "";
          }
      }

      // Receive Messages
      db.ref("messages").on("child_added", (snapshot) => {
          const chatBox = document.getElementById('chat-box');
          if(chatBox.innerHTML.includes("Loading")) chatBox.innerHTML = "";
          const p = document.createElement('p');
          p.innerHTML = "<b>User:</b> " + snapshot.val().text;
          chatBox.appendChild(p);
          chatBox.scrollTop = chatBox.scrollHeight;
      });
    </script>
</body>
</html>

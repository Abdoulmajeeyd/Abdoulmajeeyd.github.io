<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANONYCHAT</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f0f0f;
            color:white;
        }

        .container{
            width:95%;
            max-width:900px;
            margin:auto;
            margin-top:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            background:#007bff;
            color:white;
        }

        button:hover{
            opacity:0.9;
        }

        nav{
            margin-bottom:20px;
            padding:10px;
            background:#1e1e1e;
            border-radius:10px;
        }

        nav a{
            color:#00bfff;
            cursor:pointer;
            margin-right:15px;
            text-decoration:none;
        }

        .chat-layout{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .users-panel{
            width:250px;
            background:#1c1c1c;
            padding:15px;
            border-radius:10px;
            height:500px;
            overflow-y:auto;
        }

        .chat-panel{
            flex:1;
            background:#1c1c1c;
            padding:15px;
            border-radius:10px;
            display:flex;
            flex-direction:column;
            height:500px;
        }

        #chat-box{
            flex:1;
            overflow-y:auto;
            background:#111;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .message{
            margin-bottom:10px;
            padding:10px;
            border-radius:10px;
            background:#2c2c2c;
        }

        .my-message{
            background:#005eff;
        }

        .user-btn{
            width:100%;
            text-align:left;
            margin-bottom:10px;
            background:#292929;
        }

        .chat-input-area{
            display:flex;
            gap:10px;
        }

        .chat-input-area input{
            flex:1;
            margin-top:0;
        }

        @media(max-width:700px){

            .chat-layout{
                flex-direction:column;
            }

            .users-panel{
                width:100%;
                height:200px;
            }

            .chat-panel{
                height:500px;
            }

        }

    </style>
</head>
<body>

<div class="container">

    <!-- AUTH -->
    <div id="auth-section">

        <h2>ANONYCHAT</h2>

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">

        <button onclick="signUp()">Sign Up</button>

        <button onclick="login()" style="background:#28a745;">
            Login
        </button>

    </div>

    <!-- MAIN -->
    <div id="main-content" style="display:none;">

        <nav>
            <a onclick="showPage('chat')">Chat</a>

            <a onclick="showPage('profile')">Profile</a>

            <a onclick="logout()">Logout</a>
        </nav>

        <!-- CHAT PAGE -->
        <div id="page-chat">

            <div class="chat-layout">

                <!-- USERS -->
                <div class="users-panel">

                    <h3>Users</h3>

                    <div id="users-list"></div>

                </div>

                <!-- CHAT -->
                <div class="chat-panel">

                    <h3 id="chat-title">
                        Select a user
                    </h3>

                    <div id="chat-box"></div>

                    <div class="chat-input-area">

                        <input
                            type="text"
                            id="chat-input"
                            placeholder="Type message..."
                        >

                        <button onclick="sendMsg()">
                            Send
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- PROFILE PAGE -->
        <div id="page-profile" style="display:none;">

            <h2>Your Profile</h2>

            <p id="user-email-display"></p>

            <input
                type="text"
                id="username-input"
                placeholder="Choose username"
            >

            <button onclick="updateUsername()">
                Save Username
            </button>

        </div>

    </div>

</div>

<script>

    // FIREBASE CONFIG
    const firebaseConfig = {

        apiKey: "AIzaSyAy19nnMz2BH-vJ0w27sfMYD6IhlWUothQ",

        authDomain: "my-chat-944a0.firebaseapp.com",

        databaseURL: "https://my-chat-944a0-default-rtdb.firebaseio.com",

        projectId: "my-chat-944a0",

        storageBucket: "my-chat-944a0.firebasestorage.app",

        messagingSenderId: "176386861788",

        appId: "1:176386861788:web:b2cf1263b4774138c4a219"

    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    const db = firebase.database();

    // GLOBAL VARIABLES
    let currentUsername = "Guest";

    let selectedUser = null;

    let currentChatId = null;

    // SIGN UP
    function signUp(){

        const email =
            document.getElementById('email').value;

        const password =
            document.getElementById('password').value;

        auth.createUserWithEmailAndPassword(
            email,
            password
        )
        .catch(err => alert(err.message));

    }

    // LOGIN
    function login(){

        const email =
            document.getElementById('email').value;

        const password =
            document.getElementById('password').value;

        auth.signInWithEmailAndPassword(
            email,
            password
        )
        .catch(err => alert(err.message));

    }

    // LOGOUT
    function logout(){

        auth.signOut();

        location.reload();

    }

    // AUTH STATE
    auth.onAuthStateChanged(user => {

        if(user){

            document.getElementById(
                'auth-section'
            ).style.display = 'none';

            document.getElementById(
                'main-content'
            ).style.display = 'block';

            document.getElementById(
                'user-email-display'
            ).innerText =
                "Logged in as: " + user.email;

            // SAVE USER
            db.ref('users/' + user.uid).set({

                email:user.email

            });

            loadProfile(user.uid);

            loadUsers();

        }

    });

    // PROFILE
    function updateUsername(){

        const username =
            document.getElementById(
                'username-input'
            ).value;

        if(username.trim() === ""){

            alert("Username required");

            return;

        }

        db.ref(
            'profiles/' + auth.currentUser.uid
        ).set({

            username:username

        });

        currentUsername = username;

        alert("Username updated");

    }

    // LOAD PROFILE
    function loadProfile(uid){

        db.ref('profiles/' + uid)
        .on('value', snap => {

            if(
                snap.val() &&
                snap.val().username
            ){

                currentUsername =
                    snap.val().username;

                document.getElementById(
                    'username-input'
                ).value =
                    currentUsername;

            }else{

                currentUsername =
                    auth.currentUser.email;

            }

        });

    }

    // LOAD USERS
    function loadUsers(){

        db.ref('users')
        .on('value', snap => {

            const usersDiv =
                document.getElementById(
                    'users-list'
                );

            usersDiv.innerHTML = "";

            snap.forEach(child => {

                const user = child.val();

                const uid = child.key;

                if(uid !== auth.currentUser.uid){

                    const btn =
                        document.createElement(
                            'button'
                        );

                    btn.className = "user-btn";

                    btn.innerText =
                        user.email;

                    btn.onclick = () =>
                        openPrivateChat(
                            uid,
                            user.email
                        );

                    usersDiv.appendChild(btn);

                }

            });

        });

    }

    // GENERATE CHAT ID
    function generateChatId(uid1, uid2){

        return [uid1, uid2]
        .sort()
        .join("_");

    }

    // OPEN CHAT
    function openPrivateChat(uid, email){

        selectedUser = uid;

        currentChatId =
            generateChatId(
                auth.currentUser.uid,
                uid
            );

        document.getElementById(
            'chat-title'
        ).innerText =
            "Chat with " + email;

        document.getElementById(
            'chat-box'
        ).innerHTML = "";

        db.ref(
            'privateChats/' + currentChatId
        ).off();

        db.ref(
            'privateChats/' + currentChatId
        )
        .limitToLast(100)
        .on('child_added', snap => {

            const m = snap.val();

            const div =
                document.createElement('div');

            div.className = "message";

            if(
                m.sender ===
                auth.currentUser.uid
            ){

                div.classList.add(
                    'my-message'
                );

            }

            div.textContent =
                m.name + ": " + m.text;

            document.getElementById(
                'chat-box'
            ).appendChild(div);

            document.getElementById(
                'chat-box'
            ).scrollTop =
                document.getElementById(
                    'chat-box'
                ).scrollHeight;

        });

    }

    // SEND MESSAGE
    function sendMsg(){

        const input =
            document.getElementById(
                'chat-input'
            );

        const text = input.value;

        if(!selectedUser){

            alert("Select user first");

            return;

        }

        if(text.trim() === ""){

            return;

        }

        db.ref(
            'privateChats/' + currentChatId
        ).push({

            sender:auth.currentUser.uid,

            name:currentUsername,

            text:text,

            timestamp:Date.now()

        });

        input.value = "";

    }

    // PAGE NAVIGATION
    function showPage(page){

        document.getElementById(
            'page-chat'
        ).style.display =
            page === 'chat'
            ? 'block'
            : 'none';

        document.getElementById(
            'page-profile'
        ).style.display =
            page === 'profile'
            ? 'block'
            : 'none';

    }

</script>

</body>
</html>
